<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <title>New Password</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .wrapper {
        background-color: aliceblue;
        height: 500px;
        max-width: 900px;
        width: 100%;
        display: flex;
        flex-direction: column;
        border: 1px solid black;
        border-radius: 10px;
        overflow: hidden;
        gap: 1vh;
      }
      .unicoreImage {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 2vh;
      }
      .input-box {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
      }
      img {
        height: 4em;
        width: 6em;
        border-radius: 12px;
      }
      form {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5vh;
      }
      input {
        height: 5vh;
        width: 25vw;
        padding-left: 2vh;
        border-radius: 3px;
        border: none;
        border-bottom: 1px solid black;
      }
      input:focus {
        box-shadow: 0 0 8px rgba(172, 133, 245, 0.8);
        outline: none;
      }
      .inputs {
        display: flex;
        flex-direction: column;
        gap: 2vh;
      }
      .btn {
        height: 5vh;
        width: 20vh;
        background-color: blue;
        color: white;
        font-weight: bold;
        border-radius: 4px;
      }
      .btn:hover {
        box-shadow: 0 0 8px rgba(172, 133, 245, 0.8);
        outline: none;
      }
      a {
        text-decoration: none;
      }
      @media (max-width: 768px) {

        .wrapper {
          width: 95%;
        }
        input {
          width: 50vw;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="unicoreImage">
        <img src="logo.png" alt="" />
      </div>
      <form action="" id="resetForm">
        <div class="heading"><h1>Reset Password</h1></div>
        <div class="inputs">
          <div class="input-box">
            <i class="fa-solid fa-key"></i>
            <input
              type="password"
              placeholder="New Password"
              required
              id="new-password"
            />
          </div>
          <div class="input-box">
            <i class="fa-solid fa-key"></i>
            <input
              type="password"
              placeholder="Confirm Password"
              required
              id="confirm-password"
            />
          </div>
        </div>

        <div class="login-button">
          <button type="submit" class="btn">Reset Password</button>
        </div>
        <div class="back-page">
          <a href="index.html">Back to page</a>
        </div>
      </form>
    </div>
    <script>
      document
        .getElementById("resetForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const newPassword = document.getElementById("new-password").value;
          const confirmPassword =
            document.getElementById("confirm-password").value;

          if (newPassword !== confirmPassword) {
            alert("Passwords do not match ❌");
            return;
          }

          fetch(
            "https://login-page-rxnz.onrender.com/unicore/auth/reset-password",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + localStorage.getItem("resetToken"),
              },
              body: JSON.stringify({
                newPassword,
                confirmPassword,
              }),
            },
          )
            .then((response) => {
              if (!response.ok) {
                response.text().then((result) => {
                  alert(result); // backend actual message
                });
                return; // stop further execution
              } else {
                alert("Password Changed Successfully ✅");
                localStorage.removeItem("resetToken");
                return (window.location.href = "index.html");
              }
            })
            .catch((err) => {
              alert("Error in resetting pasword !!");
              console.error(err);
            });
        });
    </script>
  </body>
</html>
