<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <title>Login page</title>
  </head>
  <body>
    <div class="wrapper">
      <div class="sidebar">
        <div class="login-heading">
          <h1>Welcome to UNICORE</h1>
        </div>
        <p>
          Lorem ipsum dolor, sit amet consectetur adipisicing elit.
          Perspiciatis, odio?
        </p>
      </div>
      <form action="" id="loginForm">
        <div class="heading">
          <h1>Login</h1>
        </div>
        <div class="inputs">
          <div class="input-box">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="Username" required id="username" />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-key"></i>
            <input type="text" placeholder="Password" required id="password" />
          </div>
        </div>

        <div class="remember-forgot">
          <div><label for=""><input type="checkbox" /> Remember me</label></div>
          <div><a href="forgot.html" id="forgot">Forgot Password ?</a></div>
        </div>
        <div class="login-button">
          <button type="submit" class="btn">Login</button>
        </div>
        <div class="register-link">
          <p>Don't have an account? <a href="register.html">Register</a></p>
        </div>
      </form>
    </div>
  </body>

  <script>
    document
      .getElementById("loginForm")
      .addEventListener("submit", function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        fetch(
          "https://login-page-rxnz.onrender.com/unicore/auth/login",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username,
              password,
            }),
          },
        )
          .then((response) => {
            if (!response.ok) {
              throw new Error("Login failed");
            }
            return response.json();
          })
          .then((data) => {
            if (data.role === "ADMIN") {
              window.location.href = "admin-dash.html";
            } else if (data.role === "USER") {
              window.location.href = "main-page.html";
            } else {
              alert("Unknown role!");
            }
          })
          .catch((err) => {
            alert("Invalid username or password");
            console.error(err);
          });
      });
  </script>
</html>
