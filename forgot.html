<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <title>forgot page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      #forgotForm{
        background-color: aliceblue;
        height: 60%;
        width: auto;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap:9%;
        border: 1px solid black;
        border-radius: 7px;
        padding: 0px 10px 0px 10px;
      }
      input{
        width: auto;
        height: 35px;
        border: none;
        border-bottom: 1px solid black;
        border-radius: 3px;
        padding-left: 10px;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .btn {
        height: 5vh;
        width: 20vh;
        background-color: blue;
        color: white;
        font-weight: bold;
        border-radius: 4px;
      }
    
      .btn:hover {
        box-shadow: 0 0 8px rgba(172, 133, 245, 0.8);
        outline: none;
      }
      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
      
      <form action="" id="forgotForm">
        <div class="heading"><h1>Enter your Email</h1></div>
        <div class="para">
        <p>
          A Otp will be send to your registered Email, Enter your email Below
        </p>
        </div>

        <div class="inputs">
          <div class="input-box">
            <i class="fa fa-envelope"></i>
            <input type="email" placeholder="Email" required id="email" />
          </div>
        </div>

        <div class="login-button">
          <button type="submit" class="btn">Send OTP</button>
        </div>
        <div class="back-page">
          <a href="index.html">Back to page</a>
        </div>
      </form>
    <script>
      document
        .getElementById("forgotForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const button = document.querySelector(".btn");

          button.disabled = true;
          button.innerText = "Sending OTP...";

          try {
            const response = await fetch(
              "https://login-page-rxnz.onrender.com/unicore/auth/send-otp",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email }),
              },
            );

            // ❌ if HTTP error → go to catch
            if (!response.ok) {
              const errorMsg = await response.text();
              throw new Error(errorMsg || "Failed to send OTP");
            }

            // ✅ success response
            const data = await response.text();

            alert("✅ OTP sent successfully");
            window.location.href = "enter-otp.html";
          } catch (error) {
            alert("❌ " + error.message);
            console.error(error);
          } finally {
            button.disabled = false;
            button.innerText = "Send OTP";
          }
        });
    </script>
  </body>
</html>
